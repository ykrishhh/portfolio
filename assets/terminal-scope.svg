  <line x1="0" y1="80" x2="0" y2="20" stroke="#00E676" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="0" cy="0" r="3" fill="#00E676" fill-opacity="0.6"/>
</g>
<!-- Terminal window -->
<g transform="translate(50,80)">
  <rect x="0" y="0" width="300" height="440" rx="4" fill="url(#termGrad)" stroke="#00E676" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="300" height="28" rx="4" fill="#00E676" fill-opacity="0.06"/>
  <rect x="0" y="24" width="300" height="4" fill="#00E676" fill-opacity="0.06"/>
  <circle cx="15" cy="14" r="4" fill="#ff5f56" fill-opacity="0.6"/>
  <circle cx="30" cy="14" r="4" fill="#ffbd2e" fill-opacity="0.6"/>
  <circle cx="45" cy="14" r="4" fill="#27c93f" fill-opacity="0.6"/>
  <text x="150" y="18" text-anchor="middle" fill="#00E676" fill-opacity="0.4" font-family="monospace" font-size="9">root@hunter:~/exploit-dev</text>
  <!-- Terminal content -->
  <g fill="#00E676" fill-opacity="0.5" font-family="monospace" font-size="11">
    <text x="12" y="52">$ ./recon.sh --target 10.0.0.0/24</text>
    <text x="12" y="68">[+] Scanning subnet 10.0.0.0/24</text>
    <text x="12" y="84">[+] 47 hosts discovered</text>
    <text x="12" y="100">[+] 23 open ports found</text>
    <text x="12" y="116">[+] Fingerprinting services...</text>
    <text x="12" y="132">$ nmap -sV -sC 10.0.0.15</text>
    <text x="12" y="148">PORT    STATE SERVICE  VERSION</text>
    <text x="12" y="164">22/tcp  open  ssh      OpenSSH 8.9</text>
    <text x="12" y="180">80/tcp  open  http     nginx 1.24</text>
    <text x="12" y="196">443/tcp open  https    nginx 1.24</text>
    <text x="12" y="212">3306/tcp open  mysql    8.0.33</text>
    <text x="12" y="236">$ ./exploit.sh --target 10.0.0.15:80</text>
    <text x="12" y="252">[+] CVE-2025-XXXXX detected</text>
    <text x="12" y="268">[+] Crafting payload...</text>
    <text x="12" y="284">[+] Payload: SQLi UNION based</text>
    <text x="12" y="300">[+] Extracting schema...</text>
    <text x="12" y="316">[+] 14 tables found</text>
    <text x="12" y="340">$ cat users.sql</text>
    <text x="12" y="356">-- Dump of user credentials</text>
    <text x="12" y="372">admin:$2y$10$H4ck3d...hashed</text>
    <text x="12" y="388">root:********************</text>
    <text x="12" y="404">[!] Hashcat mode 3200</text>
    <text x="12" y="420">[+] Cracking hash mode 3200...</text>
  <text x="12" y="436">[!] Password found: H4ck3r#2024!</text>
  </g>
  <!-- Blinking cursor -->
  <rect x="12" y="446" width="7" height="12" fill="#00E676" fill-opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1s" repeatCount="indefinite"/>
  </rect>
</g>
