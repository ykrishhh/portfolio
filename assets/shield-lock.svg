</g>
<!-- Firewall rules display -->
<g font-family="monospace" font-size="7" fill="#00E676" fill-opacity="0.1">
  <text x="620" y="500">Chain INPUT (policy DROP) 47 pkts</text>
  <text x="620" y="510">  ACCEPT  tcp -- 10.0.0.0/8  state EST</text>
  <text x="620" y="520">  ACCEPT  udp -- 10.0.0.0/8  port 53</text>
  <text x="620" y="530">  DROP    tcp -- 0.0.0.0/0  22</text>
  <text x="620" y="540">Chain OUTPUT (policy ACCEPT)</text>
  <text x="620" y="550">  ACCEPT  all -- anywhere</text>
  <text x="620" y="560">Chain FORWARD (policy DROP)</text>
</g>
