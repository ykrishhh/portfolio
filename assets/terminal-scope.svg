<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
  <radialGradient id="tbg" cx="50%" cy="50%" r="75%">
    <stop offset="0%" stop-color="#0f0f0f"/><stop offset="100%" stop-color="#050505"/>
  </radialGradient>
  <radialGradient id="tglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00E676" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="termGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1a0d"/><stop offset="100%" stop-color="#050d05"/>
  </linearGradient>
  <filter id="tgf"><feGaussianBlur stdDeviation="1.5"/></filter>
</defs>
<rect width="800" height="600" fill="url(#tbg)"/>
<rect width="800" height="600" fill="url(#tglow)"/>
<!-- Scope crosshair -->
<g stroke="#00E676" stroke-opacity="0.15" stroke-width="0.8">
  <line x1="0" y1="300" x2="800" y2="300"/>
  <line x1="400" y1="0" x2="400" y2="600"/>
</g>
<g transform="translate(400,300)" stroke="#00E676" stroke-opacity="0.2" fill="none">
  <circle cx="0" cy="0" r="200" stroke-width="0.5"/>
  <circle cx="0" cy="0" r="140" stroke-width="0.5"/>
  <circle cx="0" cy="0" r="80" stroke-width="0.5"/>
</g>
<!-- Crosshair main -->
<g transform="translate(400,300)" filter="url(#tgf)">
  <circle cx="0" cy="0" r="50" fill="none" stroke="#00E676" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="-80" y1="0" x2="-20" y2="0" stroke="#00E676" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="80" y1="0" x2="20" y2="0" stroke="#00E676" stroke-width="1.5" stroke-opacity="0.5"/>
