name: Build and Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Deploy to ykrishhh.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: ykrishhh/ykrishhh.github.io
          publish_dir: ./dist
          publish_branch: main
          user_name: ykrishhh
          user_email: krishy2122@gmail.com
          commit_message: "feat: deploy portfolio update [skip ci]"
