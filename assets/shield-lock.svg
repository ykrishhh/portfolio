<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
<defs>
  <radialGradient id="bg1" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#0f0f0f"/>
    <stop offset="100%" stop-color="#050505"/>
  </radialGradient>
  <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a2a1a"/>
    <stop offset="50%" stop-color="#0d1f0d"/>
    <stop offset="100%" stop-color="#051005"/>
  </linearGradient>
  <linearGradient id="shieldBorder" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#00E676"/>
    <stop offset="50%" stop-color="#009624"/>
    <stop offset="100%" stop-color="#00E676"/>
  </linearGradient>
  <radialGradient id="glow" cx="50%" cy="40%" r="40%">
    <stop offset="0%" stop-color="#00E676" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
  </radialGradient>
  <filter id="glowFilter">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="800" height="600" fill="url(#bg1)"/>
<rect width="800" height="600" fill="url(#glow)"/>
