  <text x="8" y="52" font-family="monospace" font-size="48" font-weight="bold" fill="#EAEAEA" letter-spacing="0">[</text>
  <text x="44" y="52" font-family="monospace" font-size="48" font-weight="bold" fill="#EAEAEA" letter-spacing="0">]</text>
