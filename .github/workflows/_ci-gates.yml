# Reusable CI gates for portfolio repos.
# Callable via `uses: ./.github/workflows/_ci-gates.yml` or from any repo
# with `uses: ykrishhh/portfolio/.github/workflows/_ci-gates.yml@main`.
name: ci-gates

on:
  workflow_call:
    inputs:
      run-lighthouse:
        description: Run Lighthouse/a11y budgets. Defaults to true on pull_request events.
        type: boolean
        required: false
        default: true
      lhci-config:
        description: Path to lighthouserc.json.
        type: string
        required: false
        default: ./.github/lighthouserc.json
    secrets:
      LHCI_GITHUB_APP_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: typecheck
        run: bun run typecheck || bunx tsc --noEmit
      - name: build
        run: bun run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7

  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ inputs.run-lighthouse && github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
      - name: Lighthouse CI (perf / a11y / seo budgets)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ${{ inputs.lhci-config }}
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
