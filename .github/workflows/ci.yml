# Top-level CI wiring. Runs the reusable gates on every PR and every push to main.
# Keep this file thin — the actual steps live in _ci-gates.yml so other repos
# (and the profile repo) can reuse the same contract via `uses:`.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    uses: ./.github/workflows/_ci-gates.yml
